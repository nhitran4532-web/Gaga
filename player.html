<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:black;
}

video{
width:100%;
height:100vh;
}

</style>

</head>

<body>

<video id="video" controls autoplay></video>

<script>

let link = localStorage.getItem("live");

var video = document.getElementById('video');

if(Hls.isSupported()){

var hls = new Hls();

hls.loadSource(link);

hls.attachMedia(video);

}

</script>

</body>
</html>
