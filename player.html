<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gà Vàng Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:black;
}

video{
width:100%;
height:100vh;
}

</style>
</head>

<body>

<video id="video" controls autoplay></video>

<script>

var video=document.getElementById("video");
var link=localStorage.getItem("live");

if(Hls.isSupported()){

var hls=new Hls();
hls.loadSource(link);
hls.attachMedia(video);

}else{

video.src=link;

}

</script>

</body>
</html>
