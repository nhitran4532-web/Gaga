<script>

function loadMatch(){

fetch("https://raw.githubusercontent.com/nhitran4532-web/Gaga/main/match.json")

.then(res=>res.json())

.then(json=>{

let html="";

json.matches.forEach(match=>{

let time = match.start_date.split(" ")[1].substring(0,5);

html += `
<div class="match" onclick="watch('${match.stream}')">

<div class="team">
${match.team_1}
</div>

<div>
VS<br>
<span class="time">${time}</span>
</div>

<div class="team">
${match.team_2}
</div>

</div>
`;

});

document.getElementById("list").innerHTML = html;

});

}

function watch(url){
window.location.href=url;
}

loadMatch();

</script>
